name: Auto-Update AI Match Analysis

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시 (UTC 00:00) 실행
  workflow_dispatch: # 수동 실행 기능 제공

jobs:
  update-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run AI Analysis Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/generate-analysis.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/analysisData.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update AI match analysis via Gemini" && git push origin main)
