<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d111a"/>
      <stop offset="100%" style="stop-color:#1a2235"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#e08800"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
  </defs>

  <!-- 배경 원형 -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- 외곽 글로우 링 -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#glow)" stroke-width="1.2" opacity="0.5"/>

  <!-- 트로피 몸통 -->
  <path d="M22 14 h20 v14 a10 10 0 0 1 -20 0 Z" fill="url(#trophy)"/>

  <!-- 트로피 왼쪽 손잡이 -->
  <path d="M22 17 h-5 a5 5 0 0 0 0 10 h5" fill="none" stroke="url(#trophy)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 트로피 오른쪽 손잡이 -->
  <path d="M42 17 h5 a5 5 0 0 1 0 10 h-5" fill="none" stroke="url(#trophy)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 트로피 기둥 -->
  <rect x="29" y="28" width="6" height="9" fill="url(#trophy)"/>

  <!-- 트로피 받침대 상단 -->
  <rect x="23" y="37" width="18" height="3" rx="1.5" fill="url(#trophy)"/>

  <!-- 트로피 받침대 하단 -->
  <rect x="20" y="40" width="24" height="4" rx="2" fill="url(#trophy)"/>

  <!-- 별 장식 (왼쪽) -->
  <circle cx="19" cy="50" r="1.5" fill="#00e5ff" opacity="0.8"/>

  <!-- 별 장식 (가운데) -->
  <circle cx="32" cy="52" r="1.8" fill="#00e5ff" opacity="0.9"/>

  <!-- 별 장식 (오른쪽) -->
  <circle cx="45" cy="50" r="1.5" fill="#00e5ff" opacity="0.8"/>

  <!-- 2026 텍스트 -->
  <text x="32" y="58" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#00e5ff" text-anchor="middle" opacity="0.9">2026</text>
</svg>
